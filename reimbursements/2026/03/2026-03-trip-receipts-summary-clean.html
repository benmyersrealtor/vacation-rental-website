<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trip Receipts Summary - Clean</title>
  <style>
    @page { margin: 0.45in; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; color: #222; }
    h1, h2 { margin-bottom: 8px; }
    .meta { color: #555; margin-bottom: 20px; }
    .trip { page-break-inside: avoid; border: 1px solid #ddd; border-radius: 12px; padding: 18px; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 320px; gap: 18px; align-items: start; }
    .summary { background: #f7f7f7; padding: 14px 16px; border-radius: 10px; }
    .summary ul { margin: 8px 0 0 18px; }
    img { width: 100%; max-width: 320px; border: 1px solid #ccc; border-radius: 10px; }
    @media print {
      .trip { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <h1>Trip Receipts Summary</h1>
  <div class="meta">Prepared for Ben Myers</div>

  <div class="trip">
    <h2>NC Realtors Strategic Planning Session</h2>
    <div class="grid">
      <div>
        <div class="summary">
          <ul>
            <li><strong>Trip date:</strong> 2026-03-02</li>
            <li><strong>Receipt vendor:</strong> Grandover Resort</li>
            <li><strong>Receipt total:</strong> $80.32</li>
          </ul>
        </div>
      </div>
      <div>
        <img src="2026-03-02_grandover-resort_80.32_ben.jpg" alt="Grandover Resort receipt" />
      </div>
    </div>
  </div>

  <div class="trip">
    <h2>OBX Summit</h2>
    <div class="grid">
      <div>
        <div class="summary">
          <ul>
            <li><strong>Trip date:</strong> 2026-03-05</li>
            <li><strong>Receipt vendor:</strong> The Fresh Market</li>
            <li><strong>Receipt total:</strong> $19.20</li>
          </ul>
        </div>
      </div>
      <div>
        <img src="2026-03-05_the-fresh-market_19.20_ben.jpg" alt="The Fresh Market receipt" />
      </div>
    </div>
  </div>
</body>
</html>
